services:
  app:
    build:
      context: .
    working_dir: /app
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      APP_URL: ${APP_URL:-http://localhost:8000}
    volumes:
      - .:/app
    ports:
      - "8000:8000"
